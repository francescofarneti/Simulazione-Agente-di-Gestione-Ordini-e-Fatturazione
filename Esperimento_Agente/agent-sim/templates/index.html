<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Sim — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 13px 24px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 200;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .chip {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      background: #21262d; color: #8b949e; border: 1px solid #30363d;
    }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #8b949e;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; flex-shrink: 0; }
    .dot.running { background: #3fb950; animation: blink 1.2s ease-in-out infinite; }
    .dot.loop    { background: #58a6ff; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* CONTROLS */
    .controls {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 10px 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 6px; border: 1px solid transparent;
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background .15s, opacity .15s; white-space: nowrap;
    }
    .btn:disabled { opacity: .38; cursor: not-allowed; }
    .btn-green { background: #238636; color: #fff; border-color: #2ea043; }
    .btn-green:not(:disabled):hover { background: #2ea043; }
    .btn-blue  { background: #1f6feb; color: #fff; border-color: #388bfd; }
    .btn-blue:not(:disabled):hover  { background: #388bfd; }
    .btn-red   { background: #b91c1c; color: #fff; border-color: #dc2626; }
    .btn-red:not(:disabled):hover   { background: #dc2626; }
    .btn-ghost { background: #21262d; color: #e6edf3; border-color: #30363d; }
    .btn-ghost:not(:disabled):hover { background: #30363d; }
    .cd-badge {
      margin-left: auto; font-size: 12px; color: #8b949e;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 6px; padding: 5px 11px;
    }
    .cd-badge b { color: #58a6ff; font-size: 14px; }

    /* LAYOUT */
    .main { padding: 18px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* PIPELINE */
    .pipeline-wrap {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 16px 18px;
    }
    .pipeline-label {
      font-size: 11px; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px;
    }
    .pipeline { display: flex; align-items: center; flex-wrap: wrap; gap: 3px; }

    .step-card {
      flex: 0 0 auto; width: 100px; background: #0d1117;
      border: 1.5px solid #30363d; border-radius: 9px;
      padding: 11px 8px 10px; text-align: center;
      cursor: pointer; transition: border-color .2s, background .2s, box-shadow .2s;
      position: relative;
      user-select: none;
    }
    .step-card:hover { border-color: #484f58; }
    .step-card .snum  { font-size: 9px; color: #484f58; font-weight:700; letter-spacing:.4px; margin-bottom:5px; }
    .step-card .sicon { font-size: 22px; line-height:1; margin-bottom:6px; display:block; }
    .step-card .slabel { font-size: 10px; color: #8b949e; line-height:1.35; white-space:pre-line; }

    .step-card.active {
      border-color: #58a6ff; background: #0c1929;
      box-shadow: 0 0 14px rgba(88,166,255,.2);
    }
    .step-card.active .snum, .step-card.active .slabel { color: #79c0ff; }
    .step-card.active .sicon { animation: bob .65s ease-in-out infinite alternate; }
    @keyframes bob { from{transform:translateY(0)} to{transform:translateY(-4px)} }

    .step-card.complete { border-color: #238636; background: #091a09; }
    .step-card.complete .snum, .step-card.complete .slabel { color: #3fb950; }
    .step-card.complete::after {
      content:"✓"; position:absolute; top:4px; right:7px;
      font-size:10px; color:#3fb950; font-weight:700;
    }
    .step-card.selected {
      outline: 2px solid #e3b341; outline-offset: 2px;
    }
    .step-card.error { border-color: #da3633; background: #1c0808; }
    .step-card.error .slabel { color: #f85149; }

    .arrow { color: #30363d; font-size: 16px; flex-shrink:0; user-select:none; }

    /* DETAIL + LOG row */
    .bottom-row { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }

    /* DETAIL PANEL */
    .detail-panel {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; overflow: hidden; min-height: 360px;
      display: flex; flex-direction: column;
    }
    .detail-header {
      background: #1c2128; border-bottom: 1px solid #30363d;
      padding: 11px 16px; display: flex; align-items: center; gap: 10px;
    }
    .detail-header .step-icon-big { font-size: 20px; }
    .detail-header .step-title    { font-size: 14px; font-weight:600; }
    .detail-header .step-sub      { font-size: 12px; color: #8b949e; margin-left:auto; }
    .detail-body {
      padding: 18px; flex:1; overflow-y: auto;
    }
    .detail-body::-webkit-scrollbar { width:5px; }
    .detail-body::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }

    .empty-state {
      display: flex; flex-direction:column; align-items:center;
      justify-content: center; height: 100%; min-height:240px;
      color: #484f58; gap: 10px;
    }
    .empty-state .big { font-size: 42px; }
    .empty-state p { font-size: 13px; }

    /* Detail components */
    .mail-card {
      background: #0d1117; border: 1px solid #30363d; border-radius:8px;
      padding: 12px 14px; margin-bottom: 8px;
    }
    .mail-card .mc-subject { font-weight:600; font-size:13px; margin-bottom:4px; color:#e6edf3; }
    .mail-card .mc-from    { font-size:11px; color:#8b949e; margin-bottom:3px; }
    .mail-card .mc-meta    { font-size:11px; color:#484f58; display:flex; gap:14px; flex-wrap:wrap; }
    .mail-card .mc-meta span { color:#58a6ff; font-weight:600; }

    .field-grid { display:grid; grid-template-columns: 140px 1fr; gap:6px 12px; margin-bottom:14px; }
    .field-key  { color:#8b949e; font-size:12px; align-self:center; }
    .field-val  { color:#e6edf3; font-size:13px; font-weight:500; }

    .badge-tipo {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:12px; font-weight:700; letter-spacing:.4px;
    }
    .badge-ordine    { background:#23863622; color:#3fb950; border:1px solid #23863655; }
    .badge-altro     { background:#6e768122; color:#8b949e; border:1px solid #6e768144; }
    .badge-servizi   { background:#1f6feb22; color:#58a6ff; border:1px solid #1f6feb55; }
    .badge-prodotti  { background:#e3b34122; color:#e3b341; border:1px solid #e3b34155; }
    .badge-ricorrente{ background:#8b5cf622; color:#a78bfa; border:1px solid #8b5cf655; }
    .badge-altro2    { background:#6e768122; color:#8b949e; border:1px solid #6e768144; }

    .body-preview {
      background:#0d1117; border:1px solid #30363d; border-radius:6px;
      padding:10px 12px; font-size:12px; color:#8b949e; line-height:1.6;
      white-space:pre-wrap; max-height:100px; overflow-y:auto; margin-top:8px;
    }

    .prodotti-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
    .prodotti-table th {
      text-align:left; color:#8b949e; font-weight:600; font-size:10px;
      text-transform:uppercase; letter-spacing:.5px; padding:5px 8px;
      border-bottom:1px solid #30363d;
    }
    .prodotti-table td { padding:7px 8px; border-bottom:1px solid #21262d; color:#e6edf3; }
    .prodotti-table tr:last-child td { border-bottom:none; }
    .prodotti-table .td-num { text-align:right; color:#8b949e; }
    .prodotti-table .td-tot { text-align:right; font-weight:600; color:#3fb950; }

    .total-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 14px; background:#0d1117; border:1px solid #30363d;
      border-radius:7px; margin-top:10px;
    }
    .total-label { font-size:12px; color:#8b949e; }
    .total-val   { font-size:16px; font-weight:700; color:#3fb950; }

    /* Invoice paper */
    .invoice-paper {
      background: #f8f6f0; color: #1a1a1a;
      border-radius: 8px; padding: 20px 22px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11.5px; line-height: 1.7;
      white-space: pre; overflow-x: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      max-height: 280px; overflow-y: auto;
    }
    .invoice-paper::-webkit-scrollbar { width:5px; height:5px; }
    .invoice-paper::-webkit-scrollbar-thumb { background:#ccc; }

    .sent-confirm {
      background:#091a09; border:1px solid #238636; border-radius:8px;
      padding:18px; text-align:center;
    }
    .sent-confirm .sc-icon  { font-size:36px; margin-bottom:10px; }
    .sent-confirm .sc-title { font-size:15px; font-weight:600; color:#3fb950; margin-bottom:6px; }
    .sent-confirm .sc-sub   { font-size:12px; color:#8b949e; }
    .sent-confirm .sc-id    { font-size:12px; color:#58a6ff; margin-top:8px; font-family:monospace; }

    .pay-card {
      background:#0d1117; border:1px solid #30363d; border-radius:8px;
      padding:14px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start;
    }
    .pay-icon  { font-size:26px; flex-shrink:0; }
    .pay-body  { flex:1; }
    .pay-from  { font-weight:600; font-size:13px; margin-bottom:3px; }
    .pay-desc  { font-size:11px; color:#8b949e; line-height:1.5; margin-bottom:6px; }
    .pay-meta  { display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:#484f58; }
    .pay-meta .pm-val { color:#e3b341; font-weight:700; font-size:14px; }
    .pay-meta .pm-met { color:#8b949e; }

    .cat-result {
      display:flex; align-items:center; gap:10px; margin-top:14px;
      padding:12px 14px; background:#0d1117; border:1px solid #30363d; border-radius:8px;
    }
    .cat-result-label { font-size:12px; color:#8b949e; }
    .cat-result-badge { font-size:14px; font-weight:700; }

    .db-update-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
    .db-entry {
      display:flex; align-items:center; gap:10px;
      background:#0d1117; border:1px solid #30363d; border-radius:7px; padding:10px 12px;
    }
    .db-entry-icon { font-size:18px; flex-shrink:0; }
    .db-entry-body { flex:1; }
    .db-entry-type { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#8b949e; margin-bottom:2px; }
    .db-entry-id   { font-family:monospace; font-size:12px; color:#58a6ff; }
    .db-entry-val  { font-size:11px; color:#8b949e; }

    .db-totals {
      display:grid; grid-template-columns:1fr 1fr; gap:6px;
    }
    .db-tot-card {
      background:#0d1117; border:1px solid #30363d; border-radius:7px;
      padding:10px; text-align:center;
    }
    .db-tot-card .dtc-val  { font-size:22px; font-weight:700; color:#58a6ff; }
    .db-tot-card .dtc-label{ font-size:10px; color:#8b949e; margin-top:2px; }

    .section-title {
      font-size:11px; font-weight:600; color:#8b949e;
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;
    }

    /* RIGHT SIDE */
    .right-col { display:flex; flex-direction:column; gap:14px; }

    .log-terminal {
      background:#010409; border:1px solid #30363d; border-radius:10px; overflow:hidden;
      display:flex; flex-direction:column; flex:1;
    }
    .term-bar {
      background:#161b22; border-bottom:1px solid #30363d; padding:8px 12px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .term-dots { display:flex; gap:5px; }
    .term-dots span { width:10px; height:10px; border-radius:50%; }
    .term-dots span:nth-child(1){background:#f85149}
    .term-dots span:nth-child(2){background:#e3b341}
    .term-dots span:nth-child(3){background:#3fb950}
    .term-ttl { font-size:11px; color:#6e7681; }
    .term-clr { background:none; border:none; color:#6e7681; font-size:11px; cursor:pointer; padding:2px 5px; border-radius:3px; }
    .term-clr:hover { background:#21262d; color:#e6edf3; }
    .log-body {
      height:220px; overflow-y:auto; padding:10px 13px;
      font-family:'SFMono-Regular',Cascadia,Consolas,monospace; font-size:11.5px; line-height:1.6;
    }
    .log-body::-webkit-scrollbar{width:4px}
    .log-body::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px}
    .ll { margin-bottom:1px; white-space:pre-wrap; word-break:break-all; }
    .ll.ts     {color:#484f58}   .ll.start  {color:#e3b341;font-weight:600}
    .ll.finish {color:#3fb950;font-weight:600} .ll.s1 {color:#58a6ff}
    .ll.step   {color:#79c0ff}   .ll.cleanup{color:#484f58;font-style:italic}
    .ll.err    {color:#f85149;font-weight:600} .ll.sys{color:#e3b341;font-style:italic}

    .info-card {
      background:#161b22; border:1px solid #30363d; border-radius:10px; overflow:hidden;
    }
    .ic-header {
      padding:9px 13px; border-bottom:1px solid #30363d;
      font-size:11px; font-weight:600; color:#8b949e; text-transform:uppercase; letter-spacing:.5px;
      display:flex; align-items:center; gap:6px;
    }
    .ic-body { padding:6px 0; }
    .dr {
      display:flex; justify-content:space-between; align-items:center;
      padding:5px 13px; border-bottom:1px solid #21262d; font-size:12px;
    }
    .dr:last-child{border-bottom:none}
    .dr-k { color:#8b949e; font-family:monospace; font-size:11px; }
    .bdg {
      min-width:24px; text-align:center; padding:1px 7px;
      border-radius:10px; font-size:12px; font-weight:700;
      background:#21262d; color:#6e7681;
    }
    .bdg.has  { background:#1f6feb22; color:#58a6ff; border:1px solid #1f6feb55; }
    .bdg.done { background:#23863622; color:#3fb950; border:1px solid #23863655; }

    @media(max-width:900px){
      .bottom-row{grid-template-columns:1fr}
      .pipeline{justify-content:center}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span style="font-size:20px">&#x1F3ED;</span>
    <h1>Agent Sim</h1>
    <span class="chip">Simulazione Gestione Ordini &amp; Fatturazione</span>
  </div>
  <div class="status-pill">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Inattivo</span>
  </div>
</header>

<div class="controls">
  <button class="btn btn-green" id="btn-once" onclick="runOnce()">&#x25B6; Ciclo singolo</button>
  <button class="btn btn-blue"  id="btn-loop" onclick="toggleLoop()">&#x1F504; Avvia loop (60s)</button>
  <button class="btn btn-ghost" id="btn-seed" onclick="runSeed()">&#x1F331; Reset / Genera dati test</button>
  <div class="cd-badge" id="cd-wrap" style="display:none">
    Prossima esecuzione tra <b id="cd-val">60</b>s
  </div>
</div>

<main class="main">

  <!-- PIPELINE -->
  <div class="pipeline-wrap">
    <div class="pipeline-label">&#x26A1; Pipeline — clicca uno step per vederne i dati</div>
    <div class="pipeline" id="pipeline"></div>
  </div>

  <!-- DETAIL + LOG -->
  <div class="bottom-row">

    <!-- Detail panel -->
    <div class="detail-panel">
      <div class="detail-header" id="detail-header">
        <span class="step-icon-big" id="dh-icon">&#x1F4E6;</span>
        <span class="step-title"   id="dh-title">Seleziona uno step</span>
        <span class="step-sub"     id="dh-sub"></span>
      </div>
      <div class="detail-body" id="detail-body">
        <div class="empty-state">
          <div class="big">&#x1F50D;</div>
          <p>Avvia un ciclo per vedere i dati elaborati dall'agente.</p>
        </div>
      </div>
    </div>

    <!-- Right column -->
    <div class="right-col">

      <!-- Log -->
      <div class="log-terminal">
        <div class="term-bar">
          <div class="term-dots"><span></span><span></span><span></span></div>
          <span class="term-ttl">Log in tempo reale</span>
          <button class="term-clr" onclick="clearLog()">Pulisci</button>
        </div>
        <div class="log-body" id="log-body">
          <div class="ll sys">In attesa di un'esecuzione...</div>
        </div>
      </div>

      <!-- Cartelle -->
      <div class="info-card">
        <div class="ic-header">&#x1F4C1; Cartelle</div>
        <div class="ic-body" id="dirs-body"></div>
      </div>

      <!-- DB -->
      <div class="info-card">
        <div class="ic-header">&#x1F4BE; Gestionale</div>
        <div class="ic-body" id="db-body"></div>
      </div>

    </div>
  </div>
</main>

<script>
// =========================================================
// DEFINIZIONE STEP
// =========================================================
const STEPS = [
  { id:1, icon:"&#x1F4EC;", label:"Lettura\ninbox",         pat:"[STEP 1]", title:"Lettura inbox" },
  { id:2, icon:"&#x1F50D;", label:"Classifica\nmail",        pat:"[STEP 2]", title:"Classificazione mail" },
  { id:3, icon:"&#x1F4CB;", label:"Estrazione\ndati",        pat:"[STEP 3]", title:"Estrazione dati ordine" },
  { id:4, icon:"&#x2699;",  label:"Inoltro\nproduzione",     pat:"[STEP 4]", title:"Inoltro alla produzione" },
  { id:5, icon:"&#x1F4C4;", label:"Genera\nfattura",         pat:"[STEP 5]", title:"Generazione fattura" },
  { id:6, icon:"&#x1F4E4;", label:"Invia\nfattura",          pat:"[STEP 6]", title:"Invio fattura" },
  { id:7, icon:"&#x1F4B0;", label:"Lettura\npagamenti",      pat:"[STEP 7]", title:"Lettura pagamenti" },
  { id:8, icon:"&#x1F3F7;", label:"Categorizza\npagamento",  pat:"[STEP 8]", title:"Categorizzazione pagamento" },
  { id:9, icon:"&#x1F4BE;", label:"Aggiorna\ngestionale",    pat:"[STEP 9]", title:"Aggiornamento gestionale" },
];

// =========================================================
// STATO UI
// =========================================================
let stepStates    = {};   // {1:"idle", 2:"active", ...}
let selectedStep  = null; // step selezionato manualmente (null = segue attivo)
let userPinned    = false; // l'utente ha cliccato manualmente?
let loopActive    = false;
let liveData      = {};   // ultimo dato da /api/live
let resetTimer    = null;

// =========================================================
// BUILD PIPELINE
// =========================================================
function buildPipeline() {
  const wrap = document.getElementById("pipeline");
  wrap.innerHTML = "";
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const a = document.createElement("div");
      a.className = "arrow"; a.innerHTML = "&#x2192;"; wrap.appendChild(a);
    }
    const c = document.createElement("div");
    c.className = "step-card"; c.id = `step-${s.id}`;
    c.innerHTML = `<div class="snum">STEP ${s.id}</div><span class="sicon">${s.icon}</span><div class="slabel">${s.label}</div>`;
    c.addEventListener("click", () => selectStep(s.id, true));
    wrap.appendChild(c);
    stepStates[s.id] = "idle";
  });
}

function setStep(id, state) {
  const el = document.getElementById(`step-${id}`);
  if (!el) return;
  const sel = selectedStep === id ? " selected" : "";
  el.className = "step-card" + (state !== "idle" ? " " + state : "") + sel;
  stepStates[id] = state;
}

function resetSteps() { STEPS.forEach(s => setStep(s.id, "idle")); }
function completeActive() {
  STEPS.forEach(s => { if (stepStates[s.id] === "active") setStep(s.id, "complete"); });
}

// =========================================================
// SELEZIONE STEP (manuale o automatica)
// =========================================================
function selectStep(id, manual = false) {
  if (manual) { userPinned = true; }
  const prev = selectedStep;
  selectedStep = id;
  // aggiorna classi per rimuovere "selected" dal vecchio
  if (prev && prev !== id) {
    const prevEl = document.getElementById(`step-${prev}`);
    if (prevEl) prevEl.classList.remove("selected");
  }
  const el = document.getElementById(`step-${id}`);
  if (el) el.classList.add("selected");

  const s = STEPS.find(x => x.id === id);
  const data = liveData.step_results && liveData.step_results[String(id)];
  document.getElementById("dh-icon").innerHTML  = s ? s.icon : "&#x1F4E6;";
  document.getElementById("dh-title").textContent = s ? s.title : "";
  document.getElementById("dh-sub").textContent   = liveData.current_item || "";
  document.getElementById("detail-body").innerHTML = data
    ? renderDetail(id, data)
    : `<div class="empty-state"><div class="big">${s ? s.icon : "&#x1F4E6;"}</div><p>Nessun dato per questo step nel ciclo corrente.</p></div>`;
}

// =========================================================
// RENDERER DETAIL PER OGNI STEP
// =========================================================
function eur(v) { return "EUR " + Number(v).toLocaleString("it-IT", {minimumFractionDigits:2}); }
function ts2h(ts) { return ts ? ts.replace("T"," ").substring(0,19) : ""; }

function renderDetail(id, d) {
  switch(id) {
    case 1: return renderStep1(d);
    case 2: return renderStep2(d);
    case 3: return renderStep3(d);
    case 4: return renderStep4(d);
    case 5: return renderStep5(d);
    case 6: return renderStep6(d);
    case 7: return renderStep7(d);
    case 8: return renderStep8(d);
    case 9: return renderStep9(d);
    default: return `<pre>${JSON.stringify(d,null,2)}</pre>`;
  }
}

function renderStep1(d) {
  if (!d.trovate) return `<div class="empty-state"><div class="big">&#x1F4ED;</div><p>Nessuna mail trovata in inbox/</p></div>`;
  const cards = (d.mails||[]).map(m => `
    <div class="mail-card">
      <div class="mc-subject">&#x2709; ${m.subject}</div>
      <div class="mc-from">Da: <b>${m.from_name}</b> &lt;${m.from}&gt;</div>
      <div class="mc-meta">
        <span>${m.n_prodotti} prodott${m.n_prodotti===1?"o":"i"}</span>
        &bull;
        <span>${eur(m.totale)}</span>
        &bull; ${ts2h(m.timestamp)}
      </div>
    </div>`).join("");
  return `<div class="section-title">${d.trovate} mail trovat${d.trovate===1?"a":"e"} in inbox/</div>${cards}`;
}

function renderStep2(d) {
  const badgeCls = d.is_ordine ? "badge-ordine" : "badge-altro";
  const badgeTxt = d.is_ordine ? "&#x2714; ORDINE" : "&#x2718; NON ORDINE";
  return `
    <div class="section-title">Mail analizzata</div>
    <div class="field-grid">
      <span class="field-key">Oggetto</span>
      <span class="field-val">${d.subject}</span>
      <span class="field-key">Mittente</span>
      <span class="field-val"><b>${d.from_name}</b> &lt;${d.from}&gt;</span>
    </div>
    <div class="section-title">Corpo mail</div>
    <div class="body-preview">${d.body_preview}</div>
    <div style="margin-top:14px; display:flex; align-items:center; gap:10px;">
      <span class="field-key">Classificazione:</span>
      <span class="badge-tipo ${badgeCls}">${badgeTxt}</span>
    </div>`;
}

function renderStep3(d) {
  const rows = (d.prodotti||[]).map(p => {
    const sub = p.quantita * p.prezzo_unitario;
    return `<tr>
      <td>${p.nome}</td>
      <td class="td-num">${p.quantita}</td>
      <td class="td-num">${eur(p.prezzo_unitario)}</td>
      <td class="td-tot">${eur(sub)}</td>
    </tr>`;
  }).join("");
  return `
    <div class="field-grid" style="margin-bottom:14px">
      <span class="field-key">Cliente</span>   <span class="field-val"><b>${d.cliente}</b></span>
      <span class="field-key">Email</span>     <span class="field-val">${d.email_cliente}</span>
      ${d.note ? `<span class="field-key">Note</span><span class="field-val" style="color:#8b949e">${d.note}</span>` : ""}
    </div>
    <div class="section-title">Prodotti / Servizi</div>
    <table class="prodotti-table">
      <thead><tr><th>Descrizione</th><th style="text-align:right">Qty</th><th style="text-align:right">Prezzo</th><th style="text-align:right">Subtotale</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="total-row">
      <span class="total-label">Totale imponibile</span>
      <span class="total-val">${eur(d.totale)}</span>
    </div>`;
}

function renderStep4(d) {
  const rows = (d.prodotti||[]).map(p =>
    `<tr><td>${p.nome}</td><td class="td-num">${p.quantita}</td><td class="td-tot">${eur(p.quantita*p.prezzo_unitario)}</td></tr>`
  ).join("");
  return `
    <div class="field-grid" style="margin-bottom:14px">
      <span class="field-key">ID Ordine</span>  <span class="field-val" style="color:#58a6ff;font-family:monospace"><b>${d.id_ordine}</b></span>
      <span class="field-key">Cliente</span>    <span class="field-val">${d.cliente}</span>
      <span class="field-key">File creato</span><span class="field-val" style="color:#8b949e;font-size:11px">production_queue/${d.file}</span>
      <span class="field-key">Stato</span>      <span class="field-val"><span class="badge-tipo badge-ordine">&#x2699; ${d.stato}</span></span>
    </div>
    <div class="section-title">Riepilogo prodotti</div>
    <table class="prodotti-table">
      <thead><tr><th>Prodotto</th><th style="text-align:right">Qty</th><th style="text-align:right">Totale</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="total-row"><span class="total-label">Totale ordine</span><span class="total-val">${eur(d.totale)}</span></div>`;
}

function renderStep5(d) {
  return `
    <div class="field-grid" style="margin-bottom:14px">
      <span class="field-key">ID Fattura</span> <span class="field-val" style="color:#58a6ff;font-family:monospace"><b>${d.id_fattura}</b></span>
      <span class="field-key">Cliente</span>    <span class="field-val">${d.cliente}</span>
      <span class="field-key">Inviata a</span>  <span class="field-val">${d.email_cliente}</span>
      <span class="field-key">Totale + IVA</span><span class="field-val" style="color:#3fb950;font-weight:700">${eur(d.totale * 1.22)}</span>
    </div>
    <div class="section-title">Anteprima fattura</div>
    <div class="invoice-paper">${(d.testo_fattura||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>`;
}

function renderStep6(d) {
  return `
    <div class="sent-confirm">
      <div class="sc-icon">&#x1F4E8;</div>
      <div class="sc-title">Fattura inviata con successo</div>
      <div class="sc-sub">Destinatario: <b>${d.cliente}</b></div>
      <div class="sc-sub">${d.email_cliente}</div>
      <div class="sc-id">${d.id_fattura} &bull; ${ts2h(d.timestamp_invio)}</div>
    </div>
    <div class="total-row" style="margin-top:12px">
      <span class="total-label">Importo fatturato</span>
      <span class="total-val">${eur(d.totale)}</span>
    </div>`;
}

function renderStep7(d) {
  if (!d.trovati) return `<div class="empty-state"><div class="big">&#x1F4B3;</div><p>Nessun pagamento trovato in payments/</p></div>`;
  const cards = (d.pagamenti||[]).map(p => `
    <div class="pay-card">
      <div class="pay-icon">&#x1F4B3;</div>
      <div class="pay-body">
        <div class="pay-from">${p.from_name}</div>
        <div class="pay-desc">${p.descrizione}</div>
        <div class="pay-meta">
          <span class="pm-val">${eur(p.importo)}</span>
          <span class="pm-met">via ${p.metodo}</span>
        </div>
      </div>
    </div>`).join("");
  return `<div class="section-title">${d.trovati} pagament${d.trovati===1?"o":"i"} ricevut${d.trovati===1?"o":"i"}</div>${cards}`;
}

function renderStep8(d) {
  const catBadge = {
    servizi:   "badge-servizi",
    prodotti:  "badge-prodotti",
    ricorrente:"badge-ricorrente",
    altro:     "badge-altro2",
  }[d.categoria] || "badge-altro2";
  return `
    <div class="section-title">Pagamento ricevuto</div>
    <div class="pay-card">
      <div class="pay-icon">&#x1F4B0;</div>
      <div class="pay-body">
        <div class="pay-from">${d.from_name}</div>
        <div class="pay-desc">${d.descrizione}</div>
        <div class="pay-meta">
          <span class="pm-val">${eur(d.importo)}</span>
          <span class="pm-met">tipo: ${d.tipo_orig}</span>
        </div>
      </div>
    </div>
    <div class="cat-result">
      <span class="cat-result-label">Categoria assegnata:</span>
      <span class="badge-tipo ${catBadge} cat-result-badge">&#x1F3F7; ${d.categoria.toUpperCase()}</span>
    </div>`;
}

function renderStep9(d) {
  const iconMap = {ordine:"&#x2699;", fattura:"&#x1F4C4;", pagamento:"&#x1F4B0;"};
  const entries = (d.aggiornamenti||[]).map(a => `
    <div class="db-entry">
      <div class="db-entry-icon">${iconMap[a.tipo]||"&#x1F4BE;"}</div>
      <div class="db-entry-body">
        <div class="db-entry-type">${a.tipo}</div>
        <div class="db-entry-id">${a.id}</div>
        <div class="db-entry-val">${a.cliente ? a.cliente + " &bull; " : ""}${a.importo !== undefined ? eur(a.importo) + " &bull; " + a.categoria : eur(a.totale||0)}</div>
      </div>
    </div>`).join("");
  const tot = d.db_totali || {};
  const totals = [
    ["Clienti","clienti"], ["Ordini","ordini"],
    ["Fatture","fatture"], ["Pagamenti","pagamenti"]
  ].map(([l,k]) => `
    <div class="db-tot-card">
      <div class="dtc-val">${tot[k]||0}</div>
      <div class="dtc-label">${l}</div>
    </div>`).join("");
  return `
    <div class="section-title">Voci registrate</div>
    <div class="db-update-list">${entries}</div>
    <div class="section-title">Stato gestionale</div>
    <div class="db-totals">${totals}</div>`;
}

// =========================================================
// PARSING LOG → STEP ANIMATION
// =========================================================
function processLine(line) {
  if (line.includes(">>> INIZIO CICLO")) {
    if (resetTimer) clearTimeout(resetTimer);
    resetSteps();
    userPinned = false;
  }
  if (line.includes(">>> CICLO COMPLETATO")) {
    completeActive();
    resetTimer = setTimeout(() => { resetSteps(); }, 4500);
  }
  if (line.includes("[ERRORE]")) {
    STEPS.forEach(s => { if (stepStates[s.id]==="active") setStep(s.id,"error"); });
  }
  STEPS.forEach(s => {
    if (line.includes(s.pat)) {
      STEPS.forEach(p => { if (p.id < s.id && stepStates[p.id]==="active") setStep(p.id,"complete"); });
      setStep(s.id, "active");
    }
  });
}

// =========================================================
// LOG
// =========================================================
function logClass(l) {
  if (l.includes(">>> INIZIO"))   return "start";
  if (l.includes(">>> CICLO COMPLETATO")) return "finish";
  if (l.includes("[STEP 1]"))     return "s1";
  if (/\[STEP \d\]/.test(l))      return "step";
  if (l.includes("[CLEANUP]"))    return "cleanup";
  if (l.includes("[ERRORE]"))     return "err";
  if (l.startsWith("──"))         return "sys";
  return "ts";
}
function appendLog(text, cls) {
  const b = document.getElementById("log-body");
  const ph = b.querySelector(".sys");
  if (ph && ph.textContent.includes("attesa")) ph.remove();
  const d = document.createElement("div");
  d.className = "ll " + (cls||logClass(text));
  d.textContent = text;
  b.appendChild(d);
  b.scrollTop = b.scrollHeight;
}
function clearLog() {
  document.getElementById("log-body").innerHTML = '<div class="ll sys">Log pulito.</div>';
}

// =========================================================
// SSE — log in tempo reale
// =========================================================
function connectSSE() {
  const es = new EventSource("/api/logs/stream");
  es.onmessage = ev => {
    const d = JSON.parse(ev.data);
    if (d.type === "log") {
      appendLog(d.line);
      processLine(d.line);
    } else if (d.type === "new_log") {
      appendLog("── Sessione: " + d.file + " ──", "sys");
    }
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

// =========================================================
// POLLING LIVE — aggiorna detail panel dati step
// =========================================================
async function pollLive() {
  try {
    const r = await fetch("/api/live");
    liveData = await r.json();
    const active = liveData.active_step;
    // Se non pinnato dall'utente, segui lo step attivo
    if (!userPinned && active > 0) {
      selectStep(active, false);
    }
    // Aggiorna il sub-label con l'item corrente
    document.getElementById("dh-sub").textContent = liveData.current_item || "";
    // Se il panel mostra uno step con dati aggiornati, aggiorna il contenuto
    if (selectedStep) {
      const data = liveData.step_results && liveData.step_results[String(selectedStep)];
      if (data) {
        document.getElementById("detail-body").innerHTML = renderDetail(selectedStep, data);
      }
    }
  } catch {}
  setTimeout(pollLive, 800);
}

// =========================================================
// POLLING STATUS — cartelle, db, pulsanti
// =========================================================
async function pollStatus() {
  try {
    const r = await fetch("/api/status");
    const s = await r.json();
    renderStatus(s);
  } catch {}
  setTimeout(pollStatus, 2000);
}

function renderStatus(s) {
  const dot = document.getElementById("status-dot");
  const txt = document.getElementById("status-text");
  if (s.agent_running)     { dot.className="dot running"; txt.textContent="Agente in esecuzione..."; }
  else if (s.loop_active)  { dot.className="dot loop";    txt.textContent="Loop attivo"; }
  else                     { dot.className="dot";          txt.textContent="Inattivo"; }

  loopActive = s.loop_active;
  const bl = document.getElementById("btn-loop");
  if (loopActive) { bl.textContent="⏹ Ferma loop"; bl.className="btn btn-red"; }
  else { bl.innerHTML="&#x1F504; Avvia loop (60s)"; bl.className="btn btn-blue"; }

  document.getElementById("btn-once").disabled = s.agent_running || s.loop_active;
  document.getElementById("btn-seed").disabled = s.agent_running || s.loop_active;

  const cd = document.getElementById("cd-wrap");
  if (s.loop_active && s.countdown !== null) {
    cd.style.display = "block";
    document.getElementById("cd-val").textContent = s.countdown;
  } else { cd.style.display = "none"; }

  const dirs = [
    ["inbox/",            s.dirs.inbox,            "has"],
    ["production_queue/", s.dirs.production_queue, "has"],
    ["invoices/drafts/",  s.dirs.invoices_drafts,  "has"],
    ["invoices/sent/",    s.dirs.invoices_sent,    "has"],
    ["payments/",         s.dirs.payments,         "has"],
    ["processed/",        s.dirs.processed,        "done"],
  ];
  document.getElementById("dirs-body").innerHTML = dirs.map(([n,c,cls]) =>
    `<div class="dr"><span class="dr-k">${n}</span><span class="bdg ${c>0?cls:""}">${c}</span></div>`
  ).join("");

  document.getElementById("db-body").innerHTML = [
    ["clienti", s.db.clienti], ["ordini", s.db.ordini],
    ["fatture", s.db.fatture], ["pagamenti", s.db.pagamenti],
  ].map(([k,v]) =>
    `<div class="dr"><span class="dr-k">${k}</span><span class="bdg ${v>0?"has":""}">${v}</span></div>`
  ).join("");
}

// =========================================================
// AZIONI PULSANTI
// =========================================================
async function runOnce() {
  const r = await fetch("/api/run-once", { method:"POST" });
  const d = await r.json();
  if (d.error) appendLog("[UI] " + d.error, "err");
  else { userPinned = false; }
}

async function toggleLoop() {
  if (loopActive) {
    await fetch("/api/stop-loop", { method:"POST" });
    appendLog("[UI] Segnale di stop inviato.", "sys");
  } else {
    const r = await fetch("/api/start-loop", { method:"POST" });
    const d = await r.json();
    if (d.error) appendLog("[UI] " + d.error, "err");
    else { appendLog("[UI] Loop avviato (ogni 60s).", "sys"); userPinned = false; }
  }
}

async function runSeed() {
  document.getElementById("btn-seed").disabled = true;
  appendLog("[UI] Generazione dati di test...", "sys");
  const r = await fetch("/api/seed", { method:"POST" });
  const d = await r.json();
  document.getElementById("btn-seed").disabled = false;
  if (d.error) { appendLog("[UI] " + d.error, "err"); return; }
  if (d.output) d.output.trim().split("\n").forEach(l => appendLog(l, "sys"));
}

// =========================================================
// INIT
// =========================================================
buildPipeline();
connectSSE();
pollLive();
pollStatus();
</script>
